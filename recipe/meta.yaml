{% set name = "dsc" %}
{% set version = "0.4.3.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: d145e0ec769e5b015666cfb6763f8c314acf3cdfa7a9f94d4bc2613bded1111c

build:
  noarch: python
  number: 1
  entry_points:
    - dsc = dsc.__main__:main
    - dsc-query = dsc.__query__:main
    - dsc-io = dsc.dsc_io:main
  script: '{{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv '

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - h5py
    - msgpack-python
    - numexpr
    - numpy
    - pandas >=0.24.1
    - ptable
    - pyarrow >=0.5.0
    - python >={{ python_min }}
    - sos >=0.19.7
    - sos-pbs >=0.19.6
    - sqlalchemy
    - sympy
    - tzlocal

test:
  requires:
    - python {{ python_min }}
  imports:
    - dsc
    - dsc.parser
  commands:
    - dsc --help
    - dsc-query --help
    - dsc-io --help

about:
  home: https://github.com/stephenslab/dsc
  license: MIT
  license_family: MIT
  license_file: {{ environ["RECIPE_DIR"] }}/LICENSE
  summary: Implementation of Dynamic Statistical Comparisons
  doc_url: https://stephenslab.github.io/dsc-wiki/

extra:
  recipe-maintainers:
    - gaow
    - jdblischak
